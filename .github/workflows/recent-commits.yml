name: Update GitHub Profile Page
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
