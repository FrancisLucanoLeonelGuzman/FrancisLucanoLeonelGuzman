name: Update GitHub Profile Page
on: [push]

jobs:
  gadpp_job:
    runs-on: ubuntu-latest
    name: Update GitHub Profile Page
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: GADPP
        uses: umutphp/github-action-dynamic-profile-page@v0.6.0 
        id: gadpp
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          github-username: 'FrancisLucanoLeonelGuzman'
          user-email: 'FrancisLucanoLeonelGuzman@hotmail.com'
          commit-branch: 'main'
